<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Master Skills | CV Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Admin-specific responsive layout and button styles */
        :root { --admin-max-width: none; }
        body {
            min-height: 100vh;
            color: var(--ink-900);
            font-family: "Source Sans 3", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 10% 12%, rgba(70, 112, 191, 0.22), transparent 30%),
                radial-gradient(circle at 88% 10%, rgba(147, 197, 253, 0.24), transparent 26%),
                radial-gradient(circle at 82% 88%, rgba(46, 204, 113, 0.10), transparent 22%),
                linear-gradient(160deg, #f3f6fc 0%, #e9eff8 45%, #f5f8fd 100%);
            padding: 16px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.14) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.14) 1px, transparent 1px);
            background-size: 72px 72px;
            opacity: 0.14;
        }

        .navbar {
            background: linear-gradient(190deg, rgba(17, 37, 82, 0.78), rgba(34, 66, 127, 0.68));
            color: #fff;
            padding: 1rem 1.25rem;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            box-shadow: 0 18px 40px rgba(11, 24, 57, 0.2);
        }

        .navbar h1 { letter-spacing: 0.3px; }
        .navbar a {
            color: #eaf3ff;
            text-decoration: none;
            margin-left: 1rem;
            font-weight: 600;
        }

        .container {
            width: 100%;
            max-width: none;
            margin: 16px 0 0;
        }

        .card {
            position: relative;
            padding: 1.4rem;
            border-radius: 22px;
            width: 100%;
            background: var(--glass-bg, rgba(255,255,255,0.56));
            border: 1px solid var(--line-soft, rgba(255,255,255,0.4));
            box-shadow: 0 16px 34px rgba(21, 38, 74, 0.12);
            backdrop-filter: blur(20px) saturate(145%);
            -webkit-backdrop-filter: blur(20px) saturate(145%);
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.24), transparent 40%, rgba(46, 204, 113, 0.06));
            pointer-events: none;
        }

        .card > * { position: relative; z-index: 1; }

        .stats {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 1.15rem;
        }

        .stat {
            background: linear-gradient(150deg, rgba(37, 69, 133, 0.74), rgba(58, 101, 188, 0.56));
            color: #eff5ff;
            padding: 0.9rem 1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.26);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 22px rgba(18, 40, 83, 0.16);
        }

        .input-group {
            display:flex;
            gap:0.75rem;
            align-items:center;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex:1;
            padding:0.8rem 0.9rem;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            background: rgba(255,255,255,0.6);
            color: var(--ink-900);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
        }

        .input-group input:focus {
            outline: none;
            border-color: rgba(48, 88, 166, 0.45);
            box-shadow: 0 0 0 4px rgba(48, 88, 166, 0.12);
        }

        .btn {
            padding: 0.68rem 0.9rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
        }

        .btn:hover { transform: translateY(-1px); filter: brightness(1.03); }

        .btn-add {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 10px 18px rgba(48, 88, 166, 0.22);
        }

        .btn-save {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.98), rgba(39, 174, 96, 0.94));
            color: #072033;
            padding: 0.78rem 1rem;
            box-shadow: 0 10px 18px rgba(46, 204, 113, 0.18);
        }

        .btn-reset {
            background: linear-gradient(135deg, rgba(185, 74, 74, 0.98), rgba(151, 54, 54, 0.92));
            color: #fff;
            padding: 0.78rem 1rem;
            box-shadow: 0 10px 18px rgba(185, 74, 74, 0.16);
        }

        .btn-remove {
            background: rgba(255,255,255,0.5);
            color: var(--danger);
            border: 1px solid rgba(185, 74, 74, 0.18);
            font-weight: 800;
            cursor: pointer;
            padding: 0.16rem 0.55rem;
            line-height: 1;
            min-width: 0;
        }

        .skills-grid {
            display:flex;
            flex-wrap:wrap;
            gap:0.7rem;
            align-items:flex-start;
            margin-top: 0.5rem;
        }

        .skill-tag {
            background: rgba(255,255,255,0.68);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 0.55rem 0.75rem;
            border-radius: 999px;
            display:flex;
            gap:0.45rem;
            align-items:center;
            min-width: 160px;
            box-shadow: 0 8px 18px rgba(16, 24, 40, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .actions {
            display:flex;
            gap:0.75rem;
            margin-top: 1.15rem;
            flex-wrap: wrap;
        }

        #message.message.success,
        #message.message.error {
            margin-bottom: 1rem;
            padding: 0.8rem 0.9rem;
            border-radius: 12px;
            border: 1px solid transparent;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        #message.message.success { background: rgba(46,204,113,0.14); border-color: rgba(46,204,113,0.24); color: var(--primary-dark); }
        #message.message.error { background: rgba(185,74,74,0.10); border-color: rgba(185,74,74,0.18); color: var(--danger); }

        h2 { margin-top: 0.3rem; }
        p { color: var(--ink-700); }

        @media (max-width: 640px) {
            body { padding: 10px; }
            .stats { flex-direction: column; }
            .skill-tag { min-width: 100%; }
            .input-group { flex-direction: column; align-items: stretch; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Admin: Master Skills</h1>
        <div>
            <a href="/">← Back to App</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div style="display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap; margin-bottom:1rem; align-items:flex-end;">
                <div>
                    <h2>Master Skills List</h2>
                </div>
            </div>

            <div id="message" class="message"></div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="skillCount">0</div>
                    <div class="stat-label">Total Skills</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="modifyCount">0</div>
                    <div class="stat-label">Changes</div>
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="newSkillInput" placeholder="Enter a new skill (e.g., 'Kubernetes', 'TensorFlow')">
                <button class="btn btn-add" onclick="addSkill()">Add Skill</button>
            </div>

            <div class="skills-grid" id="skillsGrid"></div>

            <div class="actions">
                <button class="btn-save" onclick="saveChanges()">Save Changes to File</button>
                <button class="btn-reset" onclick="resetToDefault()">Reset to Default</button>
            </div>
        </div>
    </div>

    <script>
        let originalSkills = [];
        let currentSkills = [];

        async function loadSkills() {
            try {
                const res = await fetch('/api/admin/master-skills');
                const data = await res.json();
                if (data.success) {
                    originalSkills = [...data.skills];
                    currentSkills = [...data.skills];
                    renderSkills();
                    updateStats();
                }
            } catch (error) {
                showMessage('Failed to load skills: ' + error.message, 'error');
            }
        }

        function renderSkills() {
            const grid = document.getElementById('skillsGrid');
            grid.innerHTML = currentSkills
                .sort()
                .map(skill => `
                    <div class="skill-tag">
                        <span>${escapeHtml(skill)}</span>
                        <button class="btn btn-remove" onclick="removeSkill('${escapeHtml(skill)}')">×</button>
                    </div>
                `)
                .join('');
        }

        function addSkill() {
            const input = document.getElementById('newSkillInput');
            const skill = input.value.trim();
            if (!skill) {
                showMessage('Skill name cannot be empty', 'error');
                return;
            }
            if (currentSkills.includes(skill)) {
                showMessage(`"${skill}" already exists`, 'error');
                return;
            }
            currentSkills.push(skill);
            input.value = '';
            renderSkills();
            updateStats();
        }

        function removeSkill(skill) {
            currentSkills = currentSkills.filter(s => s !== skill);
            renderSkills();
            updateStats();
        }

        function updateStats() {
            document.getElementById('skillCount').textContent = currentSkills.length;
            const changes = currentSkills.length !== originalSkills.length || 
                            !currentSkills.every(s => originalSkills.includes(s));
            document.getElementById('modifyCount').textContent = changes ? '✓' : '0';
        }

        async function saveChanges() {
            try {
                const res = await fetch('/api/admin/master-skills', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ skills: currentSkills })
                });
                const data = await res.json();
                if (data.success) {
                    originalSkills = [...currentSkills];
                    updateStats();
                    showMessage('Skills saved successfully!', 'success');
                } else {
                    showMessage('Failed to save: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showMessage('Error saving skills: ' + error.message, 'error');
            }
        }

        async function resetToDefault() {
            if (!confirm('Reset to default skill list? This will discard all changes.')) return;
            try {
                const res = await fetch('/api/admin/master-skills/reset', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    await loadSkills();
                    showMessage('Reset to default skills', 'success');
                }
            } catch (error) {
                showMessage('Error resetting: ' + error.message, 'error');
            }
        }

        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = 'message ' + type;
            setTimeout(() => el.className = 'message', 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('newSkillInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') addSkill();
        });

        loadSkills();
    </script>
</body>
</html>
