services:
  - type: web
    name: cv-analyzer
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir cv_analyzer app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: CV_ANALYZER_DATA_DIR
        value: /opt/render/project/src/cv_analyzer/data
    disks:
      - name: cv-analyzer-data
        mountPath: /opt/render/project/src/cv_analyzer/data
        sizeGB: 1
